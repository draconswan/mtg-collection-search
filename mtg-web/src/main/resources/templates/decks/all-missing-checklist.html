<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Deck Checklist</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
            integrity="sha384-4LISF5TTJX/fLmGSxO53rV4miRxdg84mZsxmO8Rx5jGtp/LbrixFETvWa5a6sESd"
            crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>
    <script src="/js/mana-symbols.js" defer></script>
</head>
<body>
<div th:replace="~{fragments/header :: body}"></div>
<div class="container py-4">
    <h1 class="mb-4">All Missing Cards</h1>
    <p class="text-muted">
        This page lists every card across all decks that is not marked as acquired.
    </p>
    <!-- GLOBAL FORM -->
    <form action="/decks/update-all" method="post">
        <!-- Loop over sets -->
        <div th:each="entry, setIter : ${groupedBySet}">
            <!-- Collapsible header -->
            <div class="set-header"
                 data-bs-toggle="collapse"
                 th:attr="data-bs-target='#set-' + ${setIter.index}">
                <img th:src="@{/set-icon/{code}.svg(code=${entry.value[0].base().setCode()})}" height="20">
                <strong th:text="${entry.value[0].base().setName()}"></strong>
            </div>
            <!-- Collapsible content -->
            <div class="collapse show mt-2"
                 th:id="'set-' + ${setIter.index}">
                <div class="list-group mb-4">
                    <!-- Loop over cards in this set -->
                    <div class="list-group-item card-entry"
                         th:each="card, iter : ${entry.value}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <!-- Hidden fields for global form -->
                                <input type="hidden"
                                       th:name="'cards[' + ${iter.index} + '].deckId'"
                                       th:value="${card.base().deckId()}"/>
                                <input type="hidden"
                                       th:name="'cards[' + ${iter.index} + '].cardId'"
                                       th:value="${card.base().cardId()}"/>
                                <!-- Checkbox bound to global form -->
                                <input type="checkbox"
                                       th:name="'cards[' + ${iter.index} + '].checked'"/>
                                <span th:text="${card.base().displayName()}"></span>
                                <span class="quantity-pill"
                                      th:text="'x' + ${card.base().quantity()}"></span>
                                <span class="color-col" th:text="${card.base().manaCost()}"></span>
                            </div>
                            <div>
                                <div class="deck-name">
                                    <span th:text="${card.base().deckName()}"></span>
                                    <span th:each="color : ${card.deckColors}"
                                          th:attr="data-mana=${color}"
                                          class="mana-symbol me-1"
                                          th:text="${color}">
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Submit all checked cards -->
        <button type="submit" class="btn btn-primary mt-3">
            Save All Checked Cards
        </button>
    </form>
</div>
</body>
</html>
