<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Land Group Report</title>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
    />
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
            integrity="sha384-4LISF5TTJX/fLmGSxO53rV4miRxdg84mZsxmO8Rx5jGtp/LbrixFETvWa5a6sESd"
            crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/print.css" media="print"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        .group-break {
            background-color: #eef2ff !important;
            border-top: 2px solid #c7d2fe !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>
    <script src="/js/mana-symbols.js" defer></script>
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: body}"></div>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3" th:text="${pageTitle}">Land Group Report</h1>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th style="width: 10%">Land Group</th>
                    <th style="width: 60%">Card Name</th>
                    <th style="width: 10%">Total Assigned</th>
                    <th style="width: 10%">Total Owned (+Proxies)</th>
                    <th style="width: 10%">Total Needed</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row, iter : ${landAudit}"
                    th:classappend="${iter.index == 0 or row.landGroup != landAudit[iter.index - 1].landGroup} ? 'group-break'">
                    <td th:text="${row.landGroup}"></td>
                    <td th:text="${row.cardName}"></td>
                    <td th:text="${row.totalCount}"></td>
                    <td th:text="${row.checkedCount}"></td>
                    <td th:text="${row.uncheckedCount}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
